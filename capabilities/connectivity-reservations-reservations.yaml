naftiko: 1.0.0-alpha2
info:
  label: Booking.com Connectivity Reservations API — Reservations
  description: 'Booking.com Connectivity Reservations API — Reservations. 1 operations. Lead operation: Retrieve reservations.
    Self-contained Naftiko capability covering one Booking Com business surface.'
  tags:
  - Booking Com
  - Reservations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOOKING_COM_API_KEY: BOOKING_COM_API_KEY
capability:
  consumes:
  - type: http
    namespace: connectivity-reservations-reservations
    baseUri: https://secure-supply-xml.booking.com
    description: Booking.com Connectivity Reservations API — Reservations business capability. Self-contained, no shared references.
    resources:
    - name: hotels-xml-reservations
      path: /hotels/xml/reservations
      operations:
      - name: getreservations
        method: POST
        description: Retrieve reservations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.BOOKING_COM_USER}}'
      password: '{{env.BOOKING_COM_PASS}}'
  exposes:
  - type: rest
    namespace: connectivity-reservations-reservations-rest
    port: 8080
    description: REST adapter for Booking.com Connectivity Reservations API — Reservations. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/hotels/xml/reservations
      name: hotels-xml-reservations
      description: REST surface for hotels-xml-reservations.
      operations:
      - method: POST
        name: getreservations
        description: Retrieve reservations
        call: connectivity-reservations-reservations.getreservations
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connectivity-reservations-reservations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Booking.com Connectivity Reservations API — Reservations. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: retrieve-reservations
      description: Retrieve reservations
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connectivity-reservations-reservations.getreservations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
