      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order-details
      description: Get order details
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: demand-orders.getorderdetails
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: preview-order
      description: Preview an order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: demand-orders.previeworder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
