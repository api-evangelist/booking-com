    baseUri: https://demandapi.booking.com/3.1
    description: Booking.com Demand API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders-cancel
      path: /orders/cancel
      operations:
      - name: cancelorder
        method: POST
        description: Cancel an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-create
      path: /orders/create
      operations:
      - name: createorder
        method: POST
        description: Create an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-details
      path: /orders/details
      operations:
      - name: getorderdetails
        method: POST
        description: Get order details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-preview
      path: /orders/preview
