naftiko: 1.0.0-alpha2
info:
  label: Booking.com Car Rentals API — Cars
  description: 'Booking.com Car Rentals API — Cars. 2 operations. Lead operation: Get car rental details. Self-contained Naftiko
    capability covering one Booking Com business surface.'
  tags:
  - Booking Com
  - Cars
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOOKING_COM_API_KEY: BOOKING_COM_API_KEY
capability:
  consumes:
  - type: http
    namespace: car-rentals-cars
    baseUri: https://demandapi.booking.com/3.1
    description: Booking.com Car Rentals API — Cars business capability. Self-contained, no shared references.
    resources:
    - name: cars-details
      path: /cars/details
      operations:
      - name: getcardetails
        method: POST
        description: Get car rental details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: cars-search
      path: /cars/search
      operations:
      - name: searchcarrentals
        method: POST
        description: Search car rentals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BOOKING_COM_API_KEY}}'
  exposes:
  - type: rest
    namespace: car-rentals-cars-rest
    port: 8080
    description: REST adapter for Booking.com Car Rentals API — Cars. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/cars/details
      name: cars-details
      description: REST surface for cars-details.
      operations:
      - method: POST
        name: getcardetails
        description: Get car rental details
        call: car-rentals-cars.getcardetails
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cars/search
      name: cars-search
      description: REST surface for cars-search.
      operations:
      - method: POST
        name: searchcarrentals
        description: Search car rentals
        call: car-rentals-cars.searchcarrentals
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: car-rentals-cars-mcp
    port: 9090
    transport: http
    description: MCP adapter for Booking.com Car Rentals API — Cars. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-car-rental-details
      description: Get car rental details
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: car-rentals-cars.getcardetails
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-car-rentals
      description: Search car rentals
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: car-rentals-cars.searchcarrentals
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
